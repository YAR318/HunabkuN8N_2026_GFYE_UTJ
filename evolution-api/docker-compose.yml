services:
  # =====================================================
  # EVOLUTION API - WhatsApp (Puerto 8080)
  # =====================================================
  evolution_api:
    image: atendai/evolution-api:v2.2.3
    container_name: evolution_api
    restart: unless-stopped
    environment:
      DATABASE_PROVIDER: mysql
      DATABASE_CONNECTION_URI: mysql://sail:password@mysql:3306/evolution_db
      AUTHENTICATION_API_KEY: ${EVOLUTION_API_KEY:-evolution123}
      SERVER_URL: http://localhost:8080
      SERVER_PORT: "8080"
      LOG_LEVEL: info
      STORE_MESSAGES: "true"
      STORE_CONTACTS: "true"
      STORE_CHATS: "true"
      REDIS_ENABLED: "true"
      CACHE_REDIS_ENABLED: "false"
      REDIS_URI: redis://redis:6379/0
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1030831524"
      CONFIG_SESSION_PHONE_CLIENT: "Chrome"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: "http://n8n:5678/webhook/whatsapp-v2"
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      NODE_OPTIONS: "--max-old-space-size=4096"
      SERVER_MEMORY_LIMIT: "4096"
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hunabku-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # =====================================================
  # N8N - Automatización (Puerto 5678)
  # =====================================================
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_TUNNEL_URL=https://hunabku.yeremi.work/
      - WEBHOOK_URL=https://hunabku.yeremi.work/
      - GENERIC_TIMEZONE=America/Mexico_City
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - META_ACCESS_TOKEN=${META_ACCESS_TOKEN}
      - META_PHONE_NUMBER_ID=${META_PHONE_NUMBER_ID}
      - META_WABA_ID=${META_WABA_ID}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-evolution123}
      - EVOLUTION_API_URL=http://evolution_api:8080
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - hunabku-network
    extra_hosts:
      - "hk-filament.local.com:host-gateway"
      - "host.docker.internal:host-gateway"
    depends_on:
      - evolution_api

  # =====================================================
  # HK FILAMENT - Panel Admin (Puerto 80)
  # =====================================================
  hk-filament:
    build:
      context: '../hk-filament-est/vendor/laravel/sail/runtimes/8.5'
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP:-1000}'
    image: 'sail-8.5/hk-filament'
    container_name: hk-filament
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '8000:80'
      - '5173:5173'
    environment:
      WWWUSER: '${WWWUSER:-1000}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
    volumes:
      - '../hk-filament-est:/var/www/html'
    networks:
      - hunabku-network
    depends_on:
      mysql:
        condition: service_healthy

  # =====================================================
  # HK AUTENTICACION - SSO (Puerto 8001)
  # =====================================================
  hk-autenticacion:
    build:
      context: '../HK_Autenticacion_EST/vendor/laravel/sail/runtimes/8.5'
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP:-1000}'
    image: 'sail-8.5/hk-autenticacion'
    container_name: hk-autenticacion
    restart: unless-stopped
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    ports:
      - '8001:80'
    environment:
      WWWUSER: '${WWWUSER:-1000}'
      LARAVEL_SAIL: 1
      XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
      XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
    volumes:
      - '../HK_Autenticacion_EST:/var/www/html'
    networks:
      - hunabku-network
    depends_on:
      mysql:
        condition: service_healthy

  # =====================================================
  # MYSQL - Base de datos compartida (Puerto 3306)
  # =====================================================
  mysql:
    image: 'mysql:8.4'
    container_name: hk-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: 'password'
      MYSQL_ROOT_HOST: '%'
      MYSQL_USER: 'sail'
      MYSQL_PASSWORD: 'password'
    volumes:
      - 'mysql_data:/var/lib/mysql'
      - './init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql'
    networks:
      - hunabku-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-ppassword" ]
      retries: 3
      timeout: 5s

  # =====================================================
  # REDIS - Cache (Puerto 6379)
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: hk-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - hunabku-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      retries: 3
      timeout: 5s

volumes:
  evolution_instances:
    driver: local
  n8n_data:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  hunabku-network:
    driver: bridge
